name: Claude Fix Flaky Test

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          prompt: |
            Fix the flaky test described in issue #${{ github.event.issue.number }}.

            Instructions:
            - Read the test file mentioned in the issue
            - Understand what the test does and why it's flaky
            - Common causes: missing Eventually(), short timeouts, shared state, race conditions
            - See .github/instructions/e2e-testing.instructions.md for patterns
            - Make minimal, surgical changes
          label_trigger: "claude-fix"
          claude_args: "--allowedTools Edit,Read,Write,Bash,Glob,Grep --model claude-sonnet-4-6"
          branch_prefix: "claude-fix/"
          base_branch: "master"
          github_token: ${{ secrets.COPILOT_PAT }}
