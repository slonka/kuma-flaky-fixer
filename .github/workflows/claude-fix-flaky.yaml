name: Claude Fix Flaky Test

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          prompt: |
            Fix the flaky test described in issue #${{ github.event.issue.number }}.

            Instructions:
            - Read the issue carefully for the test name, file path, and error details
            - If the issue only has a job name (no specific file), look at the linked CI run logs to identify the failing test
            - Read the test file and understand what it's testing
            - Common flaky test causes: missing Eventually(), short timeouts, shared state, race conditions
            - See .github/instructions/e2e-testing.instructions.md for patterns
            - Make minimal, surgical changes to the test code
            - You MUST make at least one file change. If you can't identify the fix, leave a comment explaining why
            - Do NOT open a PR with zero changes
          label_trigger: "claude-fix"
          claude_args: "--allowedTools Edit,Read,Write,Bash,Glob,Grep --model claude-sonnet-4-6"
          branch_prefix: "claude-fix/"
          base_branch: "master"
          github_token: ${{ secrets.COPILOT_PAT }}
