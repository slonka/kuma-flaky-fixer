name: Claude Fix Flaky Test

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  fix:
    if: github.event.label.name == 'claude-fix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          prompt: |
            Read issue #${{ github.event.issue.number }} and fix the flaky test described in it.

            Instructions:
            - Read the test file mentioned in the issue
            - Understand what the test does and why it's flaky
            - Common causes: missing Eventually(), short timeouts, shared state, race conditions
            - See .github/instructions/e2e-testing.instructions.md for patterns
            - Make minimal, surgical changes
            - Create a new branch and open a PR with label ci/verify-stability
          github_token: ${{ secrets.COPILOT_PAT }}
