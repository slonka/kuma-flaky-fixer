name: Check CI stability for PRs with "ci/verify-stability" or "ci/verify-stability-merge-master" label

on:
  # Trigger immediately when CI finishes on any branch
  workflow_run:
    workflows: ["build-test-distribute"]
    types: [completed]
  # Fallback schedule in case workflow_run doesn't fire
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch: {}
env:
  GH_USER: "github-actions[bot]"
  GH_EMAIL: "<41898282+github-actions[bot]@users.noreply.github.com>"
  MAX_STABILITY_RUNS: "8"
permissions: {}
jobs:
  trigger-ci:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.COPILOT_PAT }}
      - name: Find PRs with stability labels
        id: process_prs
        run: |
          # Use REST API - gh pr list has GraphQL/REST label inconsistency
          pr_numbers_with_verify_stability=$(gh api "repos/$GITHUB_REPOSITORY/issues?state=open&labels=ci/verify-stability&per_page=50" --jq '.[].number' | tr '\n' ' ')
          pr_numbers_with_verify_stability_merge_master=$(gh api "repos/$GITHUB_REPOSITORY/issues?state=open&labels=ci/verify-stability-merge-master&per_page=50" --jq '.[].number' | tr '\n' ' ')
          echo "PRs with 'ci/verify-stability' label: $pr_numbers_with_verify_stability"
          echo "PRs with 'ci/verify-stability-merge-master' label: $pr_numbers_with_verify_stability_merge_master"
          echo "pr_numbers_with_verify_stability=$pr_numbers_with_verify_stability" >> "$GITHUB_OUTPUT"
          echo "pr_numbers_with_verify_stability_merge_master=$pr_numbers_with_verify_stability_merge_master" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
      - name: Merge master branch (if applicable) and push a single commit
        if: steps.process_prs.outputs.pr_numbers_with_verify_stability != ''
        run: |
          eval "pr_numbers=(${{ steps.process_prs.outputs.pr_numbers_with_verify_stability }})"
          for pr_number in "${pr_numbers[@]}"; do
            current_datetime=$(date +"%Y-%m-%d %H:%M:%S")
            echo "Processing PR #$pr_number"

            # Fetch PR details to get the base branch (original branch name)
            pr_branch=$(gh pr view "$pr_number" --json headRefName --jq '.headRefName')
            echo "The original branch for PR #$pr_number is $pr_branch"
            git fetch origin "pull/$pr_number/head:$pr_branch"
            git checkout "$pr_branch"

            git config user.name "${GH_USER}"
            git config user.email "${GH_EMAIL}"

            # Check if the PR needs to merge with master
            if echo "${{ steps.process_prs.outputs.pr_numbers_with_verify_stability_merge_master }}" | grep -wq "$pr_number"; then
              echo "Merging master into PR #$pr_number"
              git fetch origin master
              git merge origin/master --no-ff --no-commit
              git commit --allow-empty -m "Merge master into PR #$pr_number"
            fi

            # Find which test suite this PR fixes (from changed files)
            changed_files=$(gh pr diff "$pr_number" --name-only)
            suite_keyword=""
            for f in $changed_files; do
              case "$f" in
                test/e2e_env/kubernetes/*) suite_keyword="kubernetes" ;;
                test/e2e_env/multizone/*) suite_keyword="multizone" ;;
                test/e2e_env/universal/*) suite_keyword="universal" ;;
                test/e2e/*) suite_keyword="test_e2e" ;;
                *_test.go) suite_keyword="test_unit" ;;
              esac
              [ -n "$suite_keyword" ] && break
            done
            echo "Suite keyword for PR #$pr_number: ${suite_keyword:-unknown}"

            # Count runs where the relevant job passed (ignore unrelated flakes)
            run_ids=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs?branch=$pr_branch&status=completed&per_page=20" \
              --jq '[.workflow_runs[] | select(.name == "build-test-distribute" and .conclusion != "cancelled") | .id] | .[]')

            stable_count=0
            total_count=0
            for run_id in $run_ids; do
              total_count=$((total_count + 1))
              if [ -z "$suite_keyword" ]; then
                # No suite detected, fall back to overall success
                conclusion=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$run_id" --jq '.conclusion')
                if [ "$conclusion" = "success" ]; then
                  stable_count=$((stable_count + 1))
                fi
              else
                # Check if the relevant job passed (ignore other job failures)
                relevant_failed=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/jobs?per_page=100" \
                  --jq "[.jobs[] | select(.name | contains(\"$suite_keyword\")) | select(.conclusion == \"failure\")] | length")
                if [ "$relevant_failed" -eq 0 ]; then
                  stable_count=$((stable_count + 1))
                fi
              fi
            done
            echo "Stability for PR #$pr_number: $stable_count/$total_count stable (need $MAX_STABILITY_RUNS)"

            if [ "$stable_count" -ge "$MAX_STABILITY_RUNS" ]; then
              echo "PR #$pr_number has $stable_count stable runs, removing label"
              gh pr edit "$pr_number" --remove-label "ci/verify-stability" || true
              gh pr edit "$pr_number" --remove-label "ci/verify-stability-merge-master" || true
              gh pr comment "$pr_number" --body "Stability verification complete: $stable_count/$total_count runs where the relevant test suite passed. Removing ci/verify-stability label. @slonka ready for review."
              continue
            fi

            # Skip if CI is already running on this branch (avoid cancelling in-progress runs)
            in_progress=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs?branch=$pr_branch&status=in_progress&per_page=5" \
              --jq "[.workflow_runs[] | select(.name == \"build-test-distribute\")] | length")
            queued=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs?branch=$pr_branch&status=queued&per_page=5" \
              --jq "[.workflow_runs[] | select(.name == \"build-test-distribute\")] | length")
            if [ "$in_progress" -gt 0 ] || [ "$queued" -gt 0 ]; then
              echo "Skipping PR #$pr_number - CI already running ($in_progress in progress, $queued queued)"
              continue
            fi

            # Commit an empty commit to trigger the CI
            echo "Pushing empty commit to trigger CI for PR #$pr_number on $current_datetime"
            git commit --allow-empty -m "Trigger CI for PR #$pr_number on $current_datetime"
            git push origin "$pr_branch"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
