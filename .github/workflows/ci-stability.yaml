name: Check CI stability for PRs with "ci/verify-stability" or "ci/verify-stability-merge-master" label

on:
  schedule:
    # Monday to Friday: Every 2 hours from 8 PM to 8 AM CEST
    - cron: "0 18 * * 1-5"
    - cron: "0 20 * * 1-5"
    - cron: "0 22 * * 1-5"
    - cron: "0 0 * * 1-5"
    - cron: "0 2 * * 2-6"
    - cron: "0 4 * * 2-6"
    - cron: "0 6 * * 2-6"
    # Saturday and Sunday: Every 2 hours all day
    - cron: "0 */2 * * 6,0"
  workflow_dispatch:  # Allows manual trigger from GitHub Actions UI
env:
  GH_USER: "github-actions[bot]"
  GH_EMAIL: "<41898282+github-actions[bot]@users.noreply.github.com>"
  MAX_STABILITY_RUNS: "4"
permissions: {}
jobs:
  trigger-ci:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.COPILOT_PAT }}
      - name: Find PRs with stability labels
        id: process_prs
        run: |
          pr_numbers_with_verify_stability=$(gh pr list --label "ci/verify-stability" --json number --jq '.[].number' | tr '\n' ' ')
          pr_numbers_with_verify_stability_merge_master=$(gh pr list --label "ci/verify-stability-merge-master" --json number --jq '.[].number' | tr '\n' ' ')
          echo "PRs with 'ci/verify-stability' label: $pr_numbers_with_verify_stability"
          echo "PRs with 'ci/verify-stability-merge-master' label: $pr_numbers_with_verify_stability_merge_master"
          echo "pr_numbers_with_verify_stability=$pr_numbers_with_verify_stability" >> "$GITHUB_OUTPUT"
          echo "pr_numbers_with_verify_stability_merge_master=$pr_numbers_with_verify_stability_merge_master" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
      - name: Merge master branch (if applicable) and push a single commit
        if: steps.process_prs.outputs.pr_numbers_with_verify_stability != ''
        run: |
          eval "pr_numbers=(${{ steps.process_prs.outputs.pr_numbers_with_verify_stability }})"
          for pr_number in "${pr_numbers[@]}"; do
            current_datetime=$(date +"%Y-%m-%d %H:%M:%S")
            echo "Processing PR #$pr_number"

            # Fetch PR details to get the base branch (original branch name)
            pr_branch=$(gh pr view "$pr_number" --json headRefName --jq '.headRefName')
            echo "The original branch for PR #$pr_number is $pr_branch"
            git fetch origin "pull/$pr_number/head:$pr_branch"
            git checkout "$pr_branch"

            git config user.name "${GH_USER}"
            git config user.email "${GH_EMAIL}"

            # Check if the PR needs to merge with master
            if echo "${{ steps.process_prs.outputs.pr_numbers_with_verify_stability_merge_master }}" | grep -wq "$pr_number"; then
              echo "Merging master into PR #$pr_number"
              git fetch origin master
              git merge origin/master --no-ff --no-commit
              git commit --allow-empty -m "Merge master into PR #$pr_number"
            fi

            # Count successful CI runs on this PR's branch
            success_count=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs?branch=$pr_branch&status=completed&per_page=20" \
              --jq "[.workflow_runs[] | select(.name == \"build-test-distribute\" and .conclusion == \"success\")] | length")
            total_count=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs?branch=$pr_branch&status=completed&per_page=20" \
              --jq "[.workflow_runs[] | select(.name == \"build-test-distribute\")] | length")
            echo "Stability for PR #$pr_number: $success_count/$total_count successful (need $MAX_STABILITY_RUNS)"

            if [ "$success_count" -ge "$MAX_STABILITY_RUNS" ]; then
              echo "PR #$pr_number has $success_count successful runs, removing label"
              gh pr edit "$pr_number" --remove-label "ci/verify-stability" || true
              gh pr edit "$pr_number" --remove-label "ci/verify-stability-merge-master" || true
              gh pr comment "$pr_number" --body "Stability verification complete: $success_count/$total_count successful CI runs. Removing ci/verify-stability label. @slonka ready for review."
              continue
            fi

            # Commit an empty commit to trigger the CI
            echo "Pushing empty commit to trigger CI for PR #$pr_number on $current_datetime"
            git commit --allow-empty -m "Trigger CI for PR #$pr_number on $current_datetime"
            git push origin "$pr_branch"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
