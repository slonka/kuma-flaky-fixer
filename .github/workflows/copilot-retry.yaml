name: Retry Copilot on CI failure

on:
  workflow_run:
    workflows: ["build-test-distribute"]
    types: [completed]

permissions:
  pull-requests: write
  actions: read

jobs:
  retry:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Check if failed run is a Copilot PR and post feedback
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          REPO="${{ github.repository }}"

          # Skip if not a copilot branch
          if [[ "$BRANCH" != copilot/* ]]; then
            echo "Not a copilot branch ($BRANCH), skipping"
            exit 0
          fi

          # Find the PR for this branch
          PR_NUMBER=$(gh pr list --repo "$REPO" --head "$BRANCH" --json number --jq '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR found for branch $BRANCH"
            exit 0
          fi

          echo "Copilot PR #$PR_NUMBER failed CI, collecting failure details..."

          FAILED_JOBS=$(gh api "repos/$REPO/actions/runs/$RUN_ID/jobs" \
            --jq '[.jobs[] | select(.conclusion == "failure") | .name] | join(", ")')

          COMMENT="CI failed on this PR. Please revise your fix.

          **Failed jobs:** $FAILED_JOBS
          **Run:** $RUN_URL

          Look at the failed test logs and update your approach. The test may need a different fix strategy."

          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$COMMENT"
          echo "Posted steering comment on PR #$PR_NUMBER"
